<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcasts - AI Builders Digest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['Instrument Serif', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #6d28d9; }

    .transcript-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.85;
      font-size: 15px;
    }

    .podcast-card {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.03) 0%, rgba(236, 72, 153, 0.03) 100%);
      border: 1px solid rgba(139, 92, 246, 0.1);
    }
    .dark .podcast-card {
      background: linear-gradient(135deg, rgba(88, 28, 135, 0.2) 0%, rgba(70, 10, 60, 0.2) 100%);
      border-color: rgba(139, 92, 246, 0.2);
    }

    .podcast-card:hover {
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 0 8px 30px -12px rgba(139, 92, 246, 0.25);
    }

    .play-button {
      background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
      box-shadow: 0 4px 20px -4px rgba(139, 92, 246, 0.5);
    }
    .play-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px -4px rgba(139, 92, 246, 0.6);
    }

    .speaker-label {
      color: #8b5cf6;
      font-weight: 600;
      font-size: 13px;
    }
    .dark .speaker-label {
      color: #a78bfa;
    }

    .timestamp {
      color: #94a3b8;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #8b5cf6 0%, #d946ef 50%, #f472b6 100%);
      border-radius: 4px 0 0 4px;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans antialiased">
  <!-- Header -->
  <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-800 sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          <span class="text-sm font-medium">Back to Digest</span>
        </a>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-800 dark:text-white">Podcasts</h1>
          <p class="text-xs text-slate-400" id="podcastCount">Loading...</p>
        </div>
      </div>
      <button id="darkModeToggle" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors">
        <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
        <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto p-6">
    <div id="podcastList" class="space-y-6">
      <div class="text-slate-400 text-center py-20">Loading podcasts...</div>
    </div>
  </main>

  <script>
    const DATA_DIR = 'data';
    let allPodcasts = [];

    // Dark mode
    function initDarkMode() {
      const saved = localStorage.getItem('darkMode');
      if (saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }

    // Load podcasts from all available dates
    async function loadPodcasts() {
      try {
        const dates = [];
        const today = new Date();
        for (let i = 0; i < 30; i++) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          dates.push(date.toISOString().split('T')[0]);
        }

        const results = await Promise.all(dates.map(date => loadDayData(date)));
        const validData = results.filter(d => d !== null && d.podcasts && d.podcasts.length > 0);

        allPodcasts = validData.flatMap(day =>
          day.podcasts.map(p => ({ ...p, date: day.date }))
        );

        document.getElementById('podcastCount').textContent = `${allPodcasts.length} episode${allPodcasts.length !== 1 ? 's' : ''}`;
        renderPodcasts();
      } catch (err) {
        console.error('Error loading podcasts:', err);
        document.getElementById('podcastList').innerHTML = '<div class="text-red-400 text-center py-20">Failed to load podcasts</div>';
      }
    }

    async function loadDayData(date) {
      try {
        const response = await fetch(`${DATA_DIR}/${date}.json`);
        if (!response.ok) return null;
        return await response.json();
      } catch {
        return null;
      }
    }

    function renderPodcasts() {
      const container = document.getElementById('podcastList');

      if (allPodcasts.length === 0) {
        container.innerHTML = '<div class="text-slate-400 text-center py-20">No podcasts available</div>';
        return;
      }

      container.innerHTML = allPodcasts.map((podcast, index) => renderPodcast(podcast, index)).join('');
    }

    function renderPodcast(podcast, index) {
      const transcript = podcast.transcript || 'No transcript available';
      const formattedTranscript = formatTranscript(transcript);

      return `
        <article class="podcast-card rounded-3xl overflow-hidden transition-all duration-300">
          <!-- Header -->
          <div class="p-6 lg:p-8">
            <div class="flex flex-col lg:flex-row lg:items-start gap-6">
              <!-- Play button & info -->
              <div class="flex items-start gap-5 flex-1">
                <a href="${sanitizeUrl(podcast.url)}" target="_blank"
                   class="play-button w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 transition-transform">
                  <svg class="w-7 h-7 text-white ml-1" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                  </svg>
                </a>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-3 mb-2">
                    <span class="px-3 py-1 bg-purple-100 dark:bg-purple-900/50 text-purple-600 dark:text-purple-300 text-xs font-semibold rounded-full">
                      ${podcast.name}
                    </span>
                    ${podcast.date ? `<span class="text-xs text-slate-400">${formatDate(podcast.date)}</span>` : ''}
                  </div>
                  <h2 class="text-xl lg:text-2xl font-bold text-slate-800 dark:text-white leading-tight">
                    ${escapeHtml(podcast.title)}
                  </h2>
                  <a href="${sanitizeUrl(podcast.url)}" target="_blank"
                     class="inline-flex items-center gap-2 mt-4 text-sm font-semibold text-purple-600 dark:text-purple-400 hover:text-purple-700 dark:hover:text-purple-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                    Listen on YouTube
                  </a>
                </div>
              </div>
            </div>
          </div>

          <!-- Transcript -->
          <div class="border-t border-purple-100 dark:border-purple-900/30 bg-white/50 dark:bg-slate-900/50">
            <div class="p-6 lg:p-8">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide flex items-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                  Transcript
                </h3>
                <span class="text-xs text-slate-400">${Math.round(transcript.length / 5)} min read</span>
              </div>
              <div class="gradient-border bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-5 lg:p-6 max-h-[600px] overflow-y-auto">
                <div class="transcript-text text-slate-600 dark:text-slate-300">
                  ${formattedTranscript}
                </div>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function formatTranscript(transcript) {
      if (!transcript) return 'No transcript available';

      // Try to format speaker labels and timestamps
      let formatted = escapeHtml(transcript);

      // Format "Speaker N | HH:MM:SS - HH:MM:SS" patterns
      formatted = formatted.replace(/(Speaker \d+)\s*\|\s*(\d{2}:\d{2}:\d{2})\s*-\s*(\d{2}:\d{2}:\d{2})/g,
        '<div class="mt-4 mb-2 flex items-center gap-3"><span class="speaker-label">$1</span><span class="timestamp">$2 - $3</span></div>');

      // Format "Speaker N | MM:SS - MM:SS" patterns
      formatted = formatted.replace(/(Speaker \d+)\s*\|\s*(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})/g,
        '<div class="mt-4 mb-2 flex items-center gap-3"><span class="speaker-label">$1</span><span class="timestamp">$2 - $3</span></div>');

      return formatted;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function sanitizeUrl(url) {
      if (!url) return '#';
      try {
        const parsed = new URL(url);
        if (parsed.protocol === 'http:' || parsed.protocol === 'https:') return url;
      } catch {}
      return '#';
    }

    // Initialize
    initDarkMode();
    document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
    loadPodcasts();
  </script>
</body>
</html>
