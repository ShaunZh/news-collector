<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Builders Digest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['Instrument Serif', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #6d28d9; }

    .tweet-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      font-size: 14px;
    }

    .tweet-text a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }
    .tweet-text a:hover { text-decoration: underline; }

    .card {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.12);
    }

    .builder-avatar {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: white; font-size: 15px;
      border-radius: 14px; flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
    }

    .delete-btn { opacity: 0; transition: opacity 0.2s; }
    .card:hover .delete-btn { opacity: 1; }

    .date-item { transition: all 0.2s ease; }
    .date-item.active {
      background: linear-gradient(135deg, #eef2ff 0%, #fae8ff 100%);
      border-left: 3px solid #8b5cf6;
    }
    .dark .date-item.active {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      border-left-color: #a78bfa;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: calc(100vh - 60px);
    }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .sidebar-left { display: none; }
    }

    .tweets-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 1200px) {
      .tweets-grid { grid-template-columns: 1fr; }
    }

    .builder-header {
      grid-column: 1 / -1;
    }

    .gradient-text {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tab styles */
    .tab-btn {
      position: relative;
      padding: 12px 24px;
      font-weight: 600;
      font-size: 14px;
      color: #64748b;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      color: #6366f1;
    }
    .tab-btn.active {
      color: #6366f1;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 3px 3px 0 0;
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* Podcast card styles */
    .podcast-card {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.03) 0%, rgba(236, 72, 153, 0.03) 100%);
      border: 1px solid rgba(139, 92, 246, 0.1);
    }
    .dark .podcast-card {
      background: linear-gradient(135deg, rgba(88, 28, 135, 0.15) 0%, rgba(70, 10, 60, 0.15) 100%);
      border-color: rgba(139, 92, 246, 0.2);
    }

    .podcast-card:hover {
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 0 8px 30px -12px rgba(139, 92, 246, 0.2);
    }

    .transcript-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.8;
      font-size: 14px;
    }

    .speaker-label {
      color: #8b5cf6;
      font-weight: 600;
      font-size: 13px;
    }
    .dark .speaker-label {
      color: #a78bfa;
    }

    .timestamp {
      color: #94a3b8;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #8b5cf6 0%, #d946ef 50%, #f472b6 100%);
      border-radius: 4px 0 0 4px;
    }

    .play-button {
      background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
      box-shadow: 0 4px 20px -4px rgba(139, 92, 246, 0.5);
    }
    .play-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px -4px rgba(139, 92, 246, 0.6);
    }

    /* Video card styles */
    .video-card {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.03) 0%, rgba(249, 115, 22, 0.03) 100%);
      border: 1px solid rgba(239, 68, 68, 0.1);
    }
    .dark .video-card {
      background: linear-gradient(135deg, rgba(127, 29, 29, 0.15) 0%, rgba(83, 30, 10, 0.15) 100%);
      border-color: rgba(239, 68, 68, 0.2);
    }
    .video-card:hover {
      border-color: rgba(239, 68, 68, 0.3);
      box-shadow: 0 8px 30px -12px rgba(239, 68, 68, 0.2);
    }

    .video-button {
      background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
      box-shadow: 0 4px 20px -4px rgba(239, 68, 68, 0.5);
    }
    .video-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px -4px rgba(239, 68, 68, 0.6);
    }

    .line-clamp-4 {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Full podcast transcript styles */
    .transcript-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.85;
      font-size: 15px;
    }

    .speaker-label {
      color: #8b5cf6;
      font-weight: 600;
      font-size: 13px;
    }
    .dark .speaker-label {
      color: #a78bfa;
    }

    .timestamp {
      color: #94a3b8;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans antialiased">
  <div id="app" class="flex flex-col h-screen">
    <!-- Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-800 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-800 dark:text-white">Builders Digest</h1>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="Search posts..."
                 class="w-56 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all">
          <svg class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <select id="builderFilter" class="border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500/50 cursor-pointer">
          <option value="">All Builders</option>
        </select>
        <button id="darkModeToggle" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors">
          <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
          <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-grid">
      <!-- Left Sidebar: Date List -->
      <aside id="dateList" class="sidebar-left bg-white dark:bg-slate-900 border-r border-slate-200/50 dark:border-slate-800 overflow-y-auto">
        <div class="p-4">
          <h2 class="text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">History</h2>
        </div>
        <div class="px-2 text-sm text-slate-400">No data loaded</div>
      </aside>

      <!-- Center: Main Content with Tabs -->
      <section class="overflow-y-auto bg-slate-50 dark:bg-slate-950 flex flex-col">
        <!-- Tabs -->
        <div class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-8 sticky top-0 z-10">
          <div class="flex items-center gap-1">
            <button class="tab-btn active" data-tab="tweets">
              <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                Twitter
                <span id="tweetCountBadge" class="ml-1 px-2 py-0.5 bg-slate-100 dark:bg-slate-700 rounded-full text-xs font-semibold">0</span>
              </span>
            </button>
            <button class="tab-btn" data-tab="podcasts">
              <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                </svg>
                Podcasts
                <span id="podcastCountBadge" class="ml-1 px-2 py-0.5 bg-purple-100 dark:bg-purple-900/50 text-purple-600 dark:text-purple-300 rounded-full text-xs font-semibold hidden">0</span>
              </span>
            </button>
            <button class="tab-btn" data-tab="videos">
              <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                </svg>
                Videos
                <span id="videoCountBadge" class="ml-1 px-2 py-0.5 bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-300 rounded-full text-xs font-semibold hidden">0</span>
              </span>
            </button>
          </div>
        </div>

        <!-- Tab Contents -->
        <div class="flex-1 overflow-y-auto">
          <!-- Tweets Tab -->
          <div id="tweetsTab" class="tab-content active">
            <div id="tweetsContent" class="p-8">
              <div class="text-slate-400 text-center py-20">Select a date to view content</div>
            </div>
          </div>

          <!-- Podcasts Tab -->
          <div id="podcastsTab" class="tab-content">
            <div id="podcastsContent" class="p-8">
              <div class="text-slate-400 text-center py-20">No podcasts available</div>
            </div>
          </div>

          <!-- Videos Tab -->
          <div id="videosTab" class="tab-content">
            <div id="videosContent" class="p-8">
              <div class="text-slate-400 text-center py-20">No videos available</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
