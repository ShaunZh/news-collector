<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Builders Digest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    /* Tweet text styling */
    .tweet-text { white-space: pre-wrap; word-break: break-word; line-height: 1.6; }

    /* Link styling */
    .tweet-text a { color: #3b82f6; text-decoration: none; }
    .tweet-text a:hover { text-decoration: underline; }

    /* Smooth transitions */
    .card { transition: all 0.2s ease; }
    .card:hover { transform: translateY(-1px); }

    /* Builder avatar */
    .builder-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; color: white; font-size: 16px;
      border-radius: 50%; flex-shrink: 0;
    }

    /* Hide delete button by default */
    .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .card:hover .delete-btn { opacity: 1; }

    /* Date item styling */
    .date-item { transition: all 0.15s ease; }
    .date-item.active { background-color: #eff6ff; border-left: 3px solid #3b82f6; }
    .dark .date-item.active { background-color: #1e3a5f; }

    /* Section divider */
    .section-title {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; margin-top: 32px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, #e2e8f0, transparent);
    }
    .dark .section-title::after {
      background: linear-gradient(to right, #334155, transparent);
    }

    /* Expandable content */
    .expand-btn {
      color: #6366f1; cursor: pointer; font-size: 13px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .expand-btn:hover { color: #4f46e5; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen">
  <div id="app" class="flex flex-col h-screen">
    <!-- Header -->
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
          <span class="text-white text-sm font-bold">AI</span>
        </div>
        <h1 class="text-lg font-semibold text-slate-800 dark:text-slate-100">Builders Digest</h1>
      </div>
      <div class="flex items-center gap-3">
        <!-- Builder Filter -->
        <select id="builderFilter" class="border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="">All Builders</option>
        </select>
        <!-- Search -->
        <div class="relative">
          <input type="text" id="searchInput" placeholder="Search..."
                 class="border border-slate-200 dark:border-slate-600 rounded-lg pl-9 pr-3 py-2 text-sm w-48 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <!-- Dark mode toggle -->
        <button id="darkModeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">
          <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
          </svg>
          <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex flex-1 overflow-hidden">
      <!-- Date List (Sidebar) -->
      <aside id="dateList" class="w-56 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 overflow-y-auto flex-shrink-0">
        <div class="p-4 text-sm text-slate-400">No data loaded</div>
      </aside>

      <!-- Content Display -->
      <section id="contentArea" class="flex-1 overflow-y-auto">
        <div class="max-w-3xl mx-auto p-6">
          <div class="text-slate-400 text-center py-12">Select a date to view content</div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
